<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOD SBIR/STTR Scanner — ShareOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: #111; }
    
    .header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header h1 { font-size: 22px; font-weight: 700; color: #111; }
    .header p { font-size: 14px; color: #6b7280; margin-top: 4px; }
    
    .stats-row {
      display: flex; gap: 16px; padding: 24px 40px;
      border-bottom: 1px solid #f3f4f6;
    }
    .stat {
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 16px 24px; min-width: 120px;
    }
    .stat .num { font-size: 28px; font-weight: 700; color: #111; }
    .stat .label { font-size: 12px; color: #6b7280; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat.high .num { color: #dc2626; }
    .stat.medium .num { color: #d97706; }
    .stat.good .num { color: #3B82F6; }
    
    .controls {
      padding: 16px 40px;
      display: flex; gap: 12px; align-items: center;
      border-bottom: 1px solid #f3f4f6;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid #e5e7eb;
      background: #fff; cursor: pointer; font-size: 13px; color: #374151;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active { background: #3B82F6; color: #fff; border-color: #3B82F6; }
    
    .main { padding: 24px 40px; }
    
    .section-title {
      font-size: 13px; font-weight: 600; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 16px 0 12px;
    }
    
    .topic-card {
      border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .topic-card:hover { border-color: #3B82F6; box-shadow: 0 2px 8px rgba(59,130,246,0.1); }
    
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .score-badge {
      min-width: 44px; height: 44px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .score-high { background: #fef2f2; color: #dc2626; }
    .score-medium { background: #fffbeb; color: #d97706; }
    .score-low { background: #f9fafb; color: #6b7280; }
    
    .card-body { flex: 1; }
    .topic-id { font-size: 11px; color: #9ca3af; font-family: monospace; margin-bottom: 3px; }
    .topic-title { font-size: 15px; font-weight: 600; color: #111; line-height: 1.3; }
    .topic-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 500;
    }
    .tag-component { background: #eff6ff; color: #1d4ed8; }
    .tag-open { background: #f0fdf4; color: #15803d; }
    .tag-prerelease { background: #fef3c7; color: #92400e; }
    .tag-venture { background: #f5f3ff; color: #6d28d9; }
    .tag-vertical { background: #f0fdf4; color: #065f46; }
    .tag-deadline { background: #fff7ed; color: #c2410c; font-weight: 600; }
    
    .card-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f3f4f6; }
    .card-detail.open { display: block; }
    .desc { font-size: 13px; color: #4b5563; line-height: 1.6; }
    
    .ventures-row { margin-top: 12px; }
    .venture-item {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 3px 4px 3px 0;
      padding: 4px 10px; border-radius: 6px;
      background: #fafafa; border: 1px solid #e5e7eb;
      font-size: 12px;
    }
    .venture-score {
      background: #3B82F6; color: #fff; border-radius: 4px;
      padding: 1px 5px; font-size: 10px; font-weight: 700;
    }
    
    .action-row { display: flex; gap: 8px; margin-top: 14px; }
    .action-btn {
      padding: 7px 14px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #3B82F6; color: #fff; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary:hover { background: #e5e7eb; }
    
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #111; color: #9ca3af;
      font-size: 11px; padding: 8px 40px;
      display: flex; justify-content: space-between;
    }
    
    .empty { padding: 40px; text-align: center; color: #9ca3af; }
    
    .urgent { border-left: 3px solid #dc2626 !important; }
    .deadline-soon { color: #dc2626 !important; }
    
    @media (max-width: 600px) {
      .header, .stats-row, .controls, .main { padding-left: 16px; padding-right: 16px; }
      .stats-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>DOD SBIR/STTR Scanner</h1>
  <p id="subtitle">Scanning active DOD SBIR/STTR topics matched to ShareOS ventures — Loading...</p>
</div>

<div class="stats-row" id="stats-row">
  <div class="stat good"><div class="num" id="s-total">—</div><div class="label">Topics Scanned</div></div>
  <div class="stat high"><div class="num" id="s-high">—</div><div class="label">High Match (50+)</div></div>
  <div class="stat medium"><div class="num" id="s-medium">—</div><div class="label">Medium Match</div></div>
  <div class="stat"><div class="num" id="s-open">—</div><div class="label">Open Deadlines</div></div>
</div>

<div class="controls">
  <span style="font-size:13px;color:#6b7280;margin-right:4px;">Filter:</span>
  <button class="filter-btn active" onclick="filterTopics('all')">All</button>
  <button class="filter-btn" onclick="filterTopics('high')">High Match</button>
  <button class="filter-btn" onclick="filterTopics('open')">Open Now</button>
  <button class="filter-btn" onclick="filterTopics('1440')">1440</button>
  <button class="filter-btn" onclick="filterTopics('feno')">Feno</button>
  <button class="filter-btn" onclick="filterTopics('original sense')">Original Sense</button>
  <button class="filter-btn" onclick="filterTopics('share health')">Share Health</button>
  <button class="filter-btn" onclick="filterTopics('instill')">instill</button>
</div>

<div class="main" id="main-content">
  <div class="empty">Loading opportunities...</div>
</div>

<div class="status-bar">
  <span id="status-left">Share Ventures — DOD SBIR/STTR Intelligence</span>
  <span id="status-right">Last scan: —</span>
</div>

<script>
let allTopics = [];
let currentFilter = 'all';

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
}

function scoreClass(score) {
  if (score >= 50) return 'score-high';
  if (score >= 25) return 'score-medium';
  return 'score-low';
}

function renderTopics(topics) {
  const container = document.getElementById('main-content');
  if (!topics.length) {
    container.innerHTML = '<div class="empty">No matching topics found.</div>';
    return;
  }
  
  const high = topics.filter(t => t.relevance_score >= 50);
  const medium = topics.filter(t => t.relevance_score >= 25 && t.relevance_score < 50);
  const low = topics.filter(t => t.relevance_score < 25);
  
  let html = '';
  
  function renderGroup(items, title) {
    if (!items.length) return '';
    let s = `<div class="section-title">${title} (${items.length})</div>`;
    for (const t of items) {
      const days = daysUntil(t.close_date);
      const urgent = days <= 7 && days >= 0;
      const past = days < 0;
      const ventures = (t.matched_ventures || []).slice(0, 4);
      const verticals = (t.matched_verticals || []).slice(0, 3);
      
      s += `
        <div class="topic-card ${urgent ? 'urgent' : ''}" onclick="toggleCard(this)">
          <div class="card-top">
            <div class="score-badge ${scoreClass(t.relevance_score)}">${t.relevance_score}</div>
            <div class="card-body">
              <div class="topic-id">${t.id}</div>
              <div class="topic-title">${t.title}</div>
              <div class="topic-meta">
                <span class="tag tag-component">${t.component}</span>
                <span class="tag ${t.status === 'Open' ? 'tag-open' : 'tag-prerelease'}">${t.status}</span>
                ${past ? '<span class="tag tag-deadline">CLOSED</span>' : 
                  urgent ? `<span class="tag tag-deadline deadline-soon">⚠ ${days}d left</span>` :
                  `<span class="tag tag-deadline">Closes ${t.close_date}</span>`}
                ${ventures.slice(0,2).map(v => `<span class="tag tag-venture">${v.name}</span>`).join('')}
                ${verticals.slice(0,2).map(v => `<span class="tag tag-vertical">${v}</span>`).join('')}
              </div>
            </div>
          </div>
          <div class="card-detail">
            <div class="desc">${t.description || 'No description available.'}</div>
            <div class="ventures-row">
              <div style="font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:600;">VENTURE MATCHES</div>
              ${ventures.map(v => `
                <span class="venture-item">
                  ${v.name}
                  <span class="venture-score">${v.score}</span>
                </span>
              `).join('')}
            </div>
            <div class="action-row">
              <a href="https://www.dodsbirsttr.mil/topics-app/" target="_blank">
                <button class="action-btn btn-primary">View on DSIP</button>
              </a>
              <button class="action-btn btn-secondary" onclick="event.stopPropagation(); startDraft('${t.id}', '${t.title.replace(/'/g,'\\'')}')">
                Start Draft Proposal
              </button>
            </div>
          </div>
        </div>`;
    }
    return s;
  }
  
  html += renderGroup(high, 'HIGH MATCH (Score 50+)');
  html += renderGroup(medium, 'MEDIUM MATCH (Score 25-49)');
  html += renderGroup(low, 'LOW MATCH');
  
  container.innerHTML = html;
}

function toggleCard(el) {
  const detail = el.querySelector('.card-detail');
  detail.classList.toggle('open');
}

function filterTopics(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  let filtered = [...allTopics];
  if (filter === 'high') filtered = filtered.filter(t => t.relevance_score >= 50);
  else if (filter === 'open') filtered = filtered.filter(t => t.status === 'Open' && daysUntil(t.close_date) >= 0);
  else if (filter !== 'all') {
    const f = filter.toLowerCase();
    filtered = filtered.filter(t => 
      (t.matched_ventures || []).some(v => v.name.toLowerCase().includes(f))
    );
  }
  
  renderTopics(filtered);
}

function startDraft(id, title) {
  alert(`Draft proposal for ${id}: "${title}"\n\nOS will generate a draft based on venture capabilities. Check WhatsApp for the output.`);
}

async function loadData() {
  try {
    const resp = await fetch('/api/opportunities');
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();
    
    allTopics = data.opportunities || [];
    
    document.getElementById('s-total').textContent = data.summary?.total || allTopics.length;
    document.getElementById('s-high').textContent = data.summary?.high || 0;
    document.getElementById('s-medium').textContent = data.summary?.medium || 0;
    document.getElementById('s-open').textContent = data.summary?.openDeadlines || 0;
    
    const scanned = data.lastScanned ? new Date(data.lastScanned).toLocaleString() : 'Unknown';
    document.getElementById('status-right').textContent = `Last scan: ${scanned}`;
    document.getElementById('subtitle').textContent = `${allTopics.length} topics scanned across DARPA, ARMY, NAVY, USAF, DHA — matched to ShareOS ventures`;
    
    renderTopics(allTopics);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `<div class="empty">Error loading data: ${err.message}</div>`;
  }
}

loadData();
</script>

</body>
</html>
